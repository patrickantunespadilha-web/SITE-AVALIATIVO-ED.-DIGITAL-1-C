<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Total | O Coração do Futebol</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar" aria-label="Menu Principal">
            <div class="logo">ARENA <span>TOTAL</span></div>
            <div class="accessibility-controls">
                <button onclick="changeFontSize('increase')" aria-label="Aumentar fonte">A+</button>
                <button onclick="changeFontSize('decrease')" aria-label="Diminuir fonte">A-</button>
                <button onclick="toggleContrast()" aria-label="Alternar Alto Contraste">
                    <span class="icon">◐</span>
                </button>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero reveal" id="inicio">
            <div class="hero-content">
                <h1>A Paixão que Une o Mundo</h1>
                <p>Acompanhe estatísticas, histórias e a emoção do futebol em um só lugar.</p>
                <a href="#noticias" class="btn-primary">Ver Últimas Notícias</a>
            </div>
        </section>

        <section class="news-section reveal" id="noticias">
            <h2>Destaques da Rodada</h2>
            <div id="news-grid" class="grid-container">
                </div>
        </section>

        <section class="carousel-section reveal" aria-labelledby="carousel-title">
            <h2 id="carousel-title">Templos do Futebol</h2>
            <div class="carousel-container">
                <div class="carousel-track" id="stadium-carousel">
                    </div>
                <div class="carousel-nav">
                    <button id="prevBtn" aria-label="Slide anterior">❮</button>
                    <button id="nextBtn" aria-label="Próximo slide">❯</button>
                </div>
            </div>
        </section>

        <section class="faq-section reveal">
            <h2>Dúvidas Frequentes</h2>
            <div id="faq-container" class="accordion">
                </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Arena Total. Desenvolvido com foco em acessibilidade.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
